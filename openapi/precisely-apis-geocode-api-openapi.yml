openapi: 3.0.1
info:
  contact:
    name: Precisely APIs Support
    url: https://support.precisely.com
  description: '

    Demographics. Audience Enrichment. Add local demographics and lifestyle

    segmentation to your audience profiles. The Demographics API returns

    household demographics and lifestyle characteristics with the input of an

    address, location coordinate, or geographic boundary. This service covers

    select countries.'
  license:
    name: Apache 2.0
    url: http://springdoc.org
  termsOfService: http://swagger.io/terms/
  title: Precisely APIs Geocode API
  version: 18.1.0
servers:
- url: https://api.precisely.com
security:
- oAuth2Password:
  - ''
tags:
- name: Geocode
paths:
  /geocode/v1/{datapackBundle}/reverseGeocode:
    get:
      description: This service accepts location coordinate and returns an address.
      operationId: reverseGeocode
      parameters:
      - description: datapackBundle
        in: path
        name: datapackBundle
        required: true
        schema:
          enum:
          - premium
          - basic
          - advanced
          type: string
      - description: Longitude of the location.
        in: query
        name: x
        required: true
        schema:
          default: -105.240976
          type: string
      - description: Latitude of the location.
        in: query
        name: y
        required: true
        schema:
          default: '40.018301'
          type: string
      - description: Country name or ISO code.
        in: query
        name: country
        required: false
        schema:
          type: string
      - description: Coordinate system to convert geometry to in format codespace:code.
        in: query
        name: coordSysName
        required: false
        schema:
          default: EPSG:4326
          type: string
      - description: Radius in which search is performed.
        in: query
        name: distance
        required: false
        schema:
          default: Radius in which search is performed.
          type: string
      - description: Unit of measurement.
        in: query
        name: distanceUnits
        required: false
        schema:
          default: METERS
          enum:
          - METERS
          - FEET
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeServiceResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/GeocodeServiceResponse'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInfo'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorInfo'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                type: string
            application/xml:
              schema:
                type: string
          description: Internal Server Error
      security:
      - oAuth2Password: []
      summary: Get Reverse Geocode(Basic/Premium/Advanced)
      tags:
      - Geocode
      x-accepts: application/json
    post:
      description: This is a Batch offering for geocode service. It accepts a single address or a list of addresses and returns location coordinates
      operationId: reverseGeocodBatch
      parameters:
      - in: path
        name: datapackBundle
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReverseGeocodeRequest'
          application/xml:
            schema:
              $ref: '#/components/schemas/ReverseGeocodeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeServiceResponseList'
            application/xml:
              schema:
                $ref: '#/components/schemas/GeocodeServiceResponseList'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInfo'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorInfo'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                type: string
            application/xml:
              schema:
                type: string
          description: Internal Server Error
      security:
      - oAuth2Password: []
      summary: Post Reverse Geocode
      tags:
      - Geocode
      x-contentType: application/json
      x-accepts: application/json
  /geocode/v1/{datapackBundle}/geocode:
    get:
      description: This service accepts an address and returns the location coordinates corresponding to that address. Premium offers the best accuracy and is a high precision geocoder leveraging Master Location Data - geocodes to Street or building level. Advanced offers advanced accuracy and geocodes to Street level.Basic offering will geocode to a Place or Postal level. Good accuracy.
      operationId: geocode
      parameters:
      - description: datapackBundle
        in: path
        name: datapackBundle
        required: true
        schema:
          enum:
          - premium
          - basic
          - advanced
          type: string
      - description: Country name or ISO code.
        in: query
        name: country
        required: false
        schema:
          default: USA
          type: string
      - description: Single line input, treated as collection of field elements.
        in: query
        name: mainAddress
        required: false
        schema:
          default: 4750 Walnut St., Boulder CO, 80301
          type: string
      - description: Match modes determine the leniency used to make a match between the input address and the reference data.
        in: query
        name: matchMode
        required: false
        schema:
          default: Standard
          enum:
          - Exact
          - Standard
          - Relaxed
          - Custom
          - Interactive(USA Only)
          - CASS(USA Only)
          type: string
      - description: Specifies whether to attempt to determine a geographic region centroid when an address-level geocode cannot be determined.
        in: query
        name: fallbackGeo
        required: false
        schema:
          default: 'true'
          type: string
      - description: Specifies whether to attempt to determine a post code centroid when an address-level geocode cannot be determined.
        in: query
        name: fallbackPostal
        required: false
        schema:
          default: 'true'
          type: string
      - description: The maximum number of candidates to return.
        in: query
        name: maxCands
        required: false
        schema:
          default: '1'
          type: string
      - description: Indicates the offset distance from the street segments to use in street-level geocoding.
        in: query
        name: streetOffset
        required: false
        schema:
          default: '7'
          type: string
      - description: Specifies the unit of measurement for the street offset.
        in: query
        name: streetOffsetUnits
        required: false
        schema:
          default: METERS
          enum:
          - METERS
          - FEET
          type: string
      - description: Specifies the distance to offset the street end points in street-level matching.
        in: query
        name: cornerOffset
        required: false
        schema:
          default: '7'
          type: string
      - description: Specifies the unit of measurement for the corner offset.
        in: query
        name: cornerOffsetUnits
        required: false
        schema:
          default: METERS
          enum:
          - METERS
          - FEET
          type: string
      - description: Specifies whether to Suppress accents and other diacritical marks.
        in: query
        name: removeAccentMarks
        required: false
        schema:
          default: 'false'
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeServiceResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/GeocodeServiceResponse'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInfo'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorInfo'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                type: string
            application/xml:
              schema:
                type: string
          description: Internal Server Error
      security:
      - oAuth2Password: []
      summary: Get Forward Geocode(Basic/Premium/Advanced)
      tags:
      - Geocode
      x-accepts: application/json
    post:
      description: This is a Batch offering for geocode service. It accepts a single address or a list of addresses and returns location coordinates
      operationId: geocodeBatch
      parameters:
      - in: path
        name: datapackBundle
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeocodeRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodeServiceResponseList'
            application/xml:
              schema:
                $ref: '#/components/schemas/GeocodeServiceResponseList'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInfo'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorInfo'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                type: string
            application/xml:
              schema:
                type: string
          description: Internal Server Error
      security:
      - oAuth2Password: []
      summary: Post Forward Geocode
      tags:
      - Geocode
      x-contentType: application/json
      x-accepts: application/json
  /geocode/v1/keylookup:
    get:
      description: This service accepts a PreciselyID and returns the corresponding address associated with that PreciselyID.
      operationId: keyLookup
      parameters:
      - description: PreciselyID which maps to a unique address.
        in: query
        name: key
        required: true
        schema:
          type: string
      - description: Specifies the key type - PreciselyID and GNAF_PID for Aus.
        in: query
        name: type
        required: true
        schema:
          type: string
      - description: 3 letter ISO code of the country to be searched.
        in: query
        name: country
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:

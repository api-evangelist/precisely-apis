apis:
  - aid: precisely-apis:precisely-apis
    name: Precisely APIs
    description: >-
      Demographics. Audience Enrichment. Add local demographics and lifestyle
      segmentation to your audience profiles. The Demographics API returns
      household demographics and lifestyle characteristics with the input of an
      address, location coordinate, or geographic boundary. This service covers
      select countries. The full Precisely APIs catalog also covers address
      verification, geocoding, property data, risks, routing, schools, streets,
      tax, and timezone services.
    humanURL: https://developer.precisely.com/apis/demographics
